<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🥔 Level Editor — Youtube Game</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:       #090910;
  --panel:    #101018;
  --panel2:   #14141e;
  --border:   #232333;
  --accent:   #5b8cff;
  --text:     #c8c8e0;
  --dim:      #44445a;

  --c-wall:    #4a7abf;
  --c-mwall:   #9b59b6;
  --c-spike:   #e74c3c;
  --c-ladder:  #e8a020;
  --c-seesaw:  #f39c12;
}

html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'Courier New',monospace; }

/* ── HEADER ── */
#hdr {
  height:44px; background:var(--panel); border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:12px; padding:0 14px; flex-shrink:0;
}
#hdr h1 { font-size:13px; color:#f0d060; letter-spacing:2px; text-transform:uppercase; white-space:nowrap; }
.hsep { width:1px; height:22px; background:var(--border); }
.hinfo { font-size:11px; color:var(--dim); display:flex; align-items:center; gap:6px; }
.hinfo b { color:var(--text); }
#snap-px { width:42px; background:#0c0c16; border:1px solid var(--border); color:var(--text); font-family:inherit; font-size:11px; padding:2px 5px; border-radius:3px; text-align:center; }
#snap-px:focus { outline:none; border-color:var(--accent); }
#level-name { width:130px; background:#0c0c16; border:1px solid var(--border); color:var(--text); font-family:inherit; font-size:12px; padding:3px 8px; border-radius:3px; }
#level-name:focus { outline:none; border-color:var(--accent); }
#zoom-lbl { min-width:38px; }

/* ── LAYOUT ── */
#wrap { display:flex; height:calc(100vh - 44px - 22px); }

/* ── LEFT TOOLBAR ── */
#toolbar {
  width:62px; background:var(--panel); border-right:1px solid var(--border);
  display:flex; flex-direction:column; align-items:center; padding:8px 0; gap:2px; flex-shrink:0; overflow-y:auto;
}
.tbtn {
  width:50px; height:50px; border:1px solid transparent; border-radius:6px;
  background:transparent; color:var(--text); cursor:pointer;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-size:18px; gap:1px; transition:background .1s, border-color .1s; position:relative;
}
.tbtn .tl { font-size:8px; color:var(--dim); text-transform:uppercase; letter-spacing:.5px; }
.tbtn:hover  { background:rgba(91,140,255,.08); border-color:var(--border); }
.tbtn.active { background:rgba(91,140,255,.18); border-color:var(--accent); }
.tbtn[title]:hover::after {
  content:attr(title); position:absolute; left:58px; top:50%; transform:translateY(-50%);
  background:#1a1a2a; border:1px solid var(--border); padding:3px 9px; border-radius:4px;
  font-size:11px; white-space:nowrap; pointer-events:none; z-index:200; color:var(--text);
}
.tsep { width:38px; height:1px; background:var(--border); margin:4px 0; flex-shrink:0; }

/* ── CANVAS ── */
#cw { flex:1; position:relative; overflow:hidden; background:#07070f; }
#cv { display:block; }

/* ── RIGHT PANEL ── */
#rpanel {
  width:236px; background:var(--panel); border-left:1px solid var(--border);
  display:flex; flex-direction:column; flex-shrink:0; overflow:hidden;
}
.rhead {
  padding:6px 12px; font-size:10px; letter-spacing:2px; text-transform:uppercase;
  color:#f0d060; background:rgba(240,208,96,.04); border-bottom:1px solid var(--border); flex-shrink:0;
}
#props-body { padding:10px 12px; display:flex; flex-direction:column; gap:5px; }
.prow { display:flex; align-items:center; gap:6px; }
.prow label { font-size:11px; color:var(--dim); width:54px; flex-shrink:0; }
.prow input, .prow select {
  flex:1; background:#0a0a14; border:1px solid var(--border); color:var(--text);
  font-family:inherit; font-size:11px; padding:3px 6px; border-radius:3px; min-width:0;
}
.prow input:focus, .prow select:focus { outline:none; border-color:var(--accent); }
.prow input[type=checkbox] { width:14px; height:14px; flex:none; cursor:pointer; }
.no-sel { padding:14px 12px; font-size:11px; color:var(--dim); }

/* obj list */
#obj-list { flex:1; overflow-y:auto; max-height:200px; padding:3px 0; }
.oitem {
  padding:4px 12px; font-size:11px; cursor:pointer; display:flex; align-items:center;
  gap:7px; border-left:2px solid transparent;
}
.oitem:hover { background:rgba(255,255,255,.03); }
.oitem.sel { background:rgba(91,140,255,.1); border-left-color:var(--accent); }
.odot { width:8px; height:8px; border-radius:2px; flex-shrink:0; }

/* right panel tabs */
#rtabs { display:flex; border-bottom:1px solid var(--border); background:var(--panel2); }
.rtab {
  flex:1; padding:6px 8px; font-size:11px; color:var(--dim); background:transparent;
  border:none; border-right:1px solid var(--border); cursor:pointer; text-transform:uppercase; letter-spacing:1px;
}
.rtab:last-child { border-right:none; }
.rtab.active { color:var(--text); background:rgba(91,140,255,.12); border-bottom:2px solid var(--accent); }
.rpanel-body { flex:1; display:none; flex-direction:column; overflow:hidden; }
.rpanel-body.active { display:flex; }

/* waves editor */
.wave-palette {
  display:flex; flex-wrap:wrap; gap:6px; padding:6px;
  border:1px dashed var(--border); background:#07070f; border-radius:4px;
}
.enemy-chip {
  font-size:10px; padding:4px 6px; border-radius:4px;
  background:#101018; border:1px solid var(--border); cursor:grab; user-select:none;
}
.waves-list { padding:6px; border:1px solid var(--border); background:#07070f; border-radius:4px; max-height:200px; overflow:auto; }
.wave-item { border:1px solid #161622; background:#0b0b14; border-radius:6px; padding:6px; margin-bottom:6px; }
.wave-head { display:flex; align-items:center; gap:6px; margin-bottom:6px; }
.wave-handle { cursor:grab; padding:2px 4px; border:1px solid var(--border); border-radius:3px; font-size:10px; }
.wave-label { font-size:10px; color:var(--dim); min-width:44px; }
.wave-input { background:#0a0a14; border:1px solid var(--border); color:var(--text); font-size:10px; padding:3px 5px; border-radius:3px; }
.wave-drop { border:1px dashed #2a2a40; padding:6px; border-radius:4px; min-height:34px; }
.wave-empty { color:var(--dim); font-size:10px; }
.wave-enemy { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
.enemy-pill { font-size:10px; padding:2px 6px; border-radius:4px; background:#16161f; border:1px solid #26263a; color:#bfe; }
.enemy-input { width:46px; background:#0a0a14; border:1px solid var(--border); color:var(--text); font-size:10px; padding:2px 4px; border-radius:3px; }
.wave-drop-target { outline:1px dashed #5b8cff; }
.wave-section-label { font-size:10px; color:var(--dim); text-transform:uppercase; letter-spacing:1px; }
.waves-panel { flex:1; display:flex; flex-direction:column; gap:6px; overflow:hidden; }
.waves-scroll { flex:1; overflow:auto; display:flex; flex-direction:column; gap:6px; }
.waves-list { flex:1; max-height:none; }
.wave-enemy-header { display:flex; align-items:center; gap:6px; margin-bottom:4px; color:var(--dim); font-size:9px; }
.wave-enemy-header .enemy-pill { background:transparent; border-color:transparent; color:var(--dim); padding:0; }

/* export */
#export-wrap { flex:1; display:flex; flex-direction:column; overflow:hidden; }
#export-inner { flex:1; display:flex; flex-direction:column; padding:8px; gap:6px; min-height:0; }
#export-code {
  flex:1; background:#07070f; border:1px solid var(--border); color:#5cff88;
  font-family:'Courier New',monospace; font-size:10px; padding:8px;
  resize:none; border-radius:4px; min-height:60px;
}
.btn {
  padding:6px 10px; border:1px solid var(--border); border-radius:4px;
  background:transparent; color:var(--text); font-family:inherit; font-size:11px;
  cursor:pointer; transition:background .12s; white-space:nowrap;
}
.btn:hover { background:rgba(255,255,255,.06); }
.brow { display:flex; gap:5px; }
.ba { border-color:var(--accent); color:var(--accent); }
.ba:hover { background:rgba(91,140,255,.12); }
.bd { border-color:#e74c3c; color:#e74c3c; }
.bd:hover { background:rgba(231,76,60,.1); }

/* ── STATUS BAR ── */
#sbar {
  height:22px; background:var(--panel); border-top:1px solid var(--border);
  display:flex; align-items:center; gap:20px; padding:0 14px;
  font-size:10px; color:var(--dim); flex-shrink:0;
}
#sbar b { color:var(--text); }

/* cursor modes */
body.cur-crosshair #cv { cursor:crosshair; }
body.cur-default   #cv { cursor:default; }
body.cur-grab      #cv { cursor:grab; }
body.cur-grabbing  #cv { cursor:grabbing; }

::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:#2a2a40; border-radius:2px; }
</style>
</head>
<body class="cur-crosshair">

<!-- HEADER -->
<div id="hdr">
  <h1>🥔 Level Editor</h1>
  <div class="hsep"></div>
  <div class="hinfo">
    Snap: <input type="number" id="snap-px" value="20" min="1" max="200">
    <label style="display:flex;align-items:center;gap:4px;cursor:pointer;color:var(--text)">
      <input type="checkbox" id="snap-on" checked> grid
    </label>
  </div>
  <div class="hsep"></div>
  <div class="hinfo">Zoom: <b id="zoom-lbl">28%</b></div>
  <div class="hsep"></div>
  <div class="hinfo" style="margin-left:auto;gap:8px">
    Level: <input type="text" id="level-name" value="my_level">
    <button class="btn"    onclick="previewLevel()">▶ Preview</button>
    <button class="btn ba" onclick="saveLevelLocal()">💾 Save Local</button>
    <button class="btn ba" onclick="downloadLevel()">⬇ Download</button>
    <button class="btn"    onclick="loadPrompt()">📂 Load</button>
    <button class="btn bd" onclick="clearAll()">🗑 Clear</button>
  </div>
</div>

<!-- MAIN -->
<div id="wrap">

  <!-- TOOLBAR -->
  <div id="toolbar">
    <button class="tbtn" id="t-select" onclick="setTool('select')" title="Select / Move  [V]">↖<span class="tl">select</span></button>
    <div class="tsep"></div>
    <button class="tbtn active" id="t-wall"  onclick="setTool('wall')"  title="Wall  [W]">🟦<span class="tl">wall</span></button>
    <button class="tbtn" id="t-wall-moving"  onclick="setTool('wall-moving')" title="Moving Wall  [M]">🟪<span class="tl">moving</span></button>
    <div class="tsep"></div>
    <button class="tbtn" id="t-spike"   onclick="setTool('spike')"   title="Spike  [S]">🔺<span class="tl">spike</span></button>
    <button class="tbtn" id="t-ladder"  onclick="setTool('ladder')"  title="Ladder  [L]">🪜<span class="tl">ladder</span></button>
    <button class="tbtn" id="t-seesaw"  onclick="setTool('seesaw')"  title="Seesaw  [E]">⚖️<span class="tl">seesaw</span></button>
      <div class="tsep"></div>
      <button class="tbtn" id="t-light" onclick="setTool('light')" title="Light  [O]">🔆<span class="tl">light</span></button>
      <button class="tbtn" id="t-spawn" onclick="setTool('spawn')" title="Spawn Zone  [P]">📍<span class="tl">spawn</span></button>
      <button class="tbtn" id="t-oven" onclick="setTool('oven')" title="Oven  [U]">🔥<span class="tl">oven</span></button>
  </div>

  <!-- CANVAS -->
  <div id="cw"><canvas id="cv"></canvas></div>

  <!-- RIGHT PANEL -->
  <div id="rpanel">

    <div id="rtabs">
      <button class="rtab active" data-tab="layout" onclick="setPanel('layout')">Layout</button>
      <button class="rtab" data-tab="waves" onclick="setPanel('waves')">Waves</button>
    </div>

    <div id="panel-layout" class="rpanel-body active">

      <div style="border-bottom:1px solid var(--border)">
        <div class="rhead">Properties</div>
        <div id="props-area"><div class="no-sel">Nothing selected.<br>Click an object to edit.</div></div>
        <div id="del-row" style="display:none;padding:6px 12px">
          <button class="btn bd" style="width:100%" onclick="deleteSelected()">🗑 Delete Object</button>
        </div>
      </div>

      <div style="border-bottom:1px solid var(--border);display:flex;flex-direction:column;max-height:220px">
        <div class="rhead">Objects &nbsp;<span id="obj-cnt" style="color:var(--text)">0</span></div>
        <div id="obj-list"></div>
      </div>

      <div id="export-wrap">
        <div class="rhead">Export JS</div>
        <div id="export-inner">
          <div class="brow">
            <button class="btn ba" style="flex:1" onclick="genExport()">⚙ Generate</button>
            <button class="btn"    onclick="copyExport()">📋 Copy</button>
          </div>
          <textarea id="export-code" readonly placeholder="Click Generate..."></textarea>
        </div>
      </div>

    </div>

    <div id="panel-waves" class="rpanel-body">
      <div class="rhead">Waves</div>
      <div class="waves-panel" style="padding:8px;">
        <div class="wave-section-label">Enemy Palette</div>
        <div class="wave-palette" id="enemy-palette"></div>

        <div class="wave-section-label">Waves List</div>
        <div class="waves-scroll">
          <div class="waves-list" id="waves-list"></div>
        </div>

        <div class="wave-section-label">Raw JSON (optional)</div>
        <textarea id="waves-json" style="width:100%;height:120px;background:#07070f;border:1px solid var(--border);color:#bfe;" placeholder='[ { "name": "Wave 1", "enemies": [ { "type":"snail", "count":3 } ], "spawnDelay":60 } ]'></textarea>
        <div style="display:flex;gap:6px">
          <button class="btn" onclick="addWave()">+ Add Wave</button>
          <button class="btn" onclick="applyWavesFromTextarea()">Apply</button>
          <button class="btn" onclick="clearWaves()">Clear</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- STATUS BAR -->
<div id="sbar">
  <span>World: <b id="st-xy">0, 0</b></span>
  <span>Objects: <b id="st-n">0</b></span>
  <span>Selected: <b id="st-sel">none</b></span>
  <span style="margin-left:auto;color:var(--dim)">Del=delete · Ctrl+Z/Y=undo/redo · Scroll=zoom · Space+drag=pan · RClick=delete</span>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  YOUTUBE GAME — LEVEL EDITOR
// ═══════════════════════════════════════════════════════════

const cv   = document.getElementById('cv');
const ctx  = cv.getContext('2d');
const cw   = document.getElementById('cw');

const WORLD_W = 2800, WORLD_H = 2100;

const bgTile = new Image();
bgTile.src = '../Assets/Tiles/Cobblestone BG.png';

// View
let vx = 0, vy = 0, zoom = 0.28;

// State
let tool     = 'wall';
let objects  = [];
let selId    = null;
let nextId   = 1;
let clipObj  = null;

// Draw drag
let drawing = false, dsx = 0, dsy = 0, dcx = 0, dcy = 0;

// Move drag
let moving = false, mOffX = 0, mOffY = 0;

// Pan
let panning = false, psx = 0, psy = 0, pvx = 0, pvy = 0;
let spaceDown = false;

// Snap
let snapOn = true, snap = 20;

// Undo
let undoStack = [], redoStack = [];

// ── Type metadata ──────────────────────────────────────────
const META = {
  wall:        { col:'#4a7abf', label:'Wall',         rect:true  },
  'wall-moving':{ col:'#9b59b6', label:'Moving Wall', rect:true  },
  spike:       { col:'#e74c3c', label:'Spike',        rect:true  },
  ladder:      { col:'#e8a020', label:'Ladder',       rect:true  },
  seesaw:      { col:'#f39c12', label:'Seesaw',       rect:true  },
  light:       { col:'#ffcc66', label:'Light',        rect:true  },
  spawn:       { col:'#f1c40f', label:'Spawn Zone',   rect:true  },
  oven:        { col:'#ff6f3c', label:'Oven',         rect:true  },
};

const DFLT_SIZE = { light: {w:120, h:120}, spawn: {w:80, h:40}, oven: {w:40, h:50}, spike: {w:40, h:26} };

const EMOJI = {};

// ── Object factory ─────────────────────────────────────────
function makeObj(type, x, y, w, h) {
  const o = { id: nextId++, type, x, y, width: w, height: h };
  if (type==='wall-moving')  Object.assign(o, { speed:1.5, range:100, axis:'h' });
  if (type==='light') Object.assign(o, { radius: Math.max(w,h) || 200, intensity: 1, color: '#ffdbaa', particleSpawnRate: 0.02 });
  if (type==='spawn') Object.assign(o, {  });
  if (type==='oven') Object.assign(o, { active: false, baked: false, glow: 0 });
  return o;
}

// ── Coords ────────────────────────────────────────────────
function toW(sx,sy){ return { x:(sx-vx)/zoom, y:(sy-vy)/zoom }; }
function snapV(v){ return snapOn ? Math.round(v/snap)*snap : Math.round(v); }

// ── Undo ──────────────────────────────────────────────────
function pushUndo(){
  undoStack.push(JSON.stringify({objects,nextId}));
  if(undoStack.length>80) undoStack.shift();
  redoStack=[];
}
function undo(){
  if(!undoStack.length) return;
  redoStack.push(JSON.stringify({objects,nextId}));
  restore(JSON.parse(undoStack.pop()));
}
function redo(){
  if(!redoStack.length) return;
  undoStack.push(JSON.stringify({objects,nextId}));
  restore(JSON.parse(redoStack.pop()));
}
function restore(s){
  objects=s.objects; nextId=s.nextId;
  selId=null; refreshUI();
}

// ── Hit test ──────────────────────────────────────────────
function hit(wx,wy){
  for(let i=objects.length-1;i>=0;i--){
    const o=objects[i];
    const w=o.width||20;
    const h=o.height||20;
    if(wx>=o.x&&wx<=o.x+w&&wy>=o.y&&wy<=o.y+h) return o;
  }
  return null;
}

// ── Tool switch ───────────────────────────────────────────
function setTool(t){
  tool=t; selId=null;
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById('t-'+t); if(el) el.classList.add('active');
  const cur = t==='select' ? 'default' : 'crosshair';
  document.body.className='cur-'+cur;
  refreshUI();
}

// ── Mouse ─────────────────────────────────────────────────
let mouseWX=0, mouseWY=0;

cv.addEventListener('mousedown', e=>{
  e.preventDefault();
  const raw=toW(e.offsetX,e.offsetY);

  // Pan: middle-click or space+left
  if(e.button===1||(e.button===0&&spaceDown)){
    panning=true; psx=e.clientX; psy=e.clientY; pvx=vx; pvy=vy;
    document.body.className='cur-grabbing'; return;
  }
  if(e.button!==0) return;

  const wx=snapV(raw.x), wy=snapV(raw.y);

  // Right-click delete
  if(e.button===2){ const h2=hit(raw.x,raw.y); if(h2) del(h2.id); return; }

  if(tool==='select'){
    const h2=hit(raw.x,raw.y);
    if(h2){
      selId=h2.id; moving=true;
      mOffX=raw.x-h2.x; mOffY=raw.y-h2.y;
      pushUndo();
    } else { selId=null; }
    refreshUI(); return;
  }

  // Rect tools
  if(META[tool]?.rect){
    drawing=true; dsx=wx; dsy=wy; dcx=wx; dcy=wy; return;
  }
});

cv.addEventListener('mousemove', e=>{
  const raw=toW(e.offsetX,e.offsetY);
  mouseWX=raw.x; mouseWY=raw.y;
  document.getElementById('st-xy').textContent=`${Math.round(raw.x)}, ${Math.round(raw.y)}`;

  if(panning){
    vx=pvx+(e.clientX-psx); vy=pvy+(e.clientY-psy); render(); return;
  }
  if(moving&&selId!==null){
    const wx=snapV(raw.x-mOffX), wy=snapV(raw.y-mOffY);
    const o=objects.find(o=>o.id===selId); if(o){o.x=wx;o.y=wy;}
    refreshProps(); render(); return;
  }
  if(drawing){ dcx=snapV(raw.x); dcy=snapV(raw.y); render(); return; }
  render();
});

cv.addEventListener('mouseup', e=>{
  if(panning){
    panning=false;
    document.body.className='cur-'+(tool==='select'?'default':'crosshair'); return;
  }
  if(moving){ moving=false; refreshUI(); return; }
  if(drawing&&e.button===0){
    drawing=false;
    let x1=Math.min(dsx,dcx), y1=Math.min(dsy,dcy);
    let w=Math.max(Math.abs(dcx-dsx),snap||4);
    let h=Math.max(Math.abs(dcy-dsy),snap||4);
    // allow spikes to use drawn dimensions (editable)
    if(w>2&&h>2){
      pushUndo();
      const o=makeObj(tool,x1,y1,w,h);
      objects.push(o); selId=o.id; refreshUI();
    }
    render();
  }
});

cv.addEventListener('contextmenu',e=>{
  e.preventDefault();
  const raw=toW(e.offsetX,e.offsetY);
  const h2=hit(raw.x,raw.y); if(h2) del(h2.id);
});

cv.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.12:0.89;
  const wx=(e.offsetX-vx)/zoom, wy=(e.offsetY-vy)/zoom;
  zoom=Math.max(0.04,Math.min(5,zoom*f));
  vx=e.offsetX-wx*zoom; vy=e.offsetY-wy*zoom;
  document.getElementById('zoom-lbl').textContent=Math.round(zoom*100)+'%';
  render();
},{passive:false});

// ── Keyboard ──────────────────────────────────────────────
window.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if(e.key===' '){ e.preventDefault(); spaceDown=true; }
  if((e.key==='Delete'||e.key==='Backspace')&&selId) del(selId);
  if(e.ctrlKey&&e.key==='z'){ e.preventDefault(); undo(); }
  if(e.ctrlKey&&e.key==='y'){ e.preventDefault(); redo(); }
  if(e.ctrlKey&&e.key.toLowerCase()==='c'){ e.preventDefault(); copySelected(); }
  if(e.ctrlKey&&e.key.toLowerCase()==='v'){ e.preventDefault(); pasteSelected(); }
  const map={v:'select',w:'wall',m:'wall-moving',s:'spike',l:'ladder',e:'seesaw'};
  if(!e.ctrlKey&&map[e.key.toLowerCase()]) setTool(map[e.key.toLowerCase()]);
});
window.addEventListener('keyup',e=>{ if(e.key===' ') spaceDown=false; });

// ── Delete ────────────────────────────────────────────────
function del(id){
  if(!id) return; pushUndo();
  objects=objects.filter(o=>o.id!==id); selId=null; refreshUI();
}
function deleteSelected(){ del(selId); }

// ── Copy / Paste ─────────────────────────────────────────
function copySelected(){
  const o=getSelObj();
  if(!o) return;
  clipObj=JSON.parse(JSON.stringify(o));
}

function pasteSelected(){
  if(!clipObj) return;
  pushUndo();
  const wx=snapV(mouseWX);
  const wy=snapV(mouseWY);
  const o=JSON.parse(JSON.stringify(clipObj));
  o.id=nextId++;
  // Place near cursor; fallback to offset if cursor is invalid
  if(Number.isFinite(wx)&&Number.isFinite(wy)){
    o.x=wx; o.y=wy;
  } else {
    o.x=(o.x||0)+snap; o.y=(o.y||0)+snap;
  }
  objects.push(o); selId=o.id; refreshUI();
}

// ── Render ────────────────────────────────────────────────
function render(){
  const W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);

  // Dark outer bg
  ctx.fillStyle='#06060d'; ctx.fillRect(0,0,W,H);

  ctx.save();
  ctx.translate(vx,vy); ctx.scale(zoom,zoom);

  // World bg
  ctx.fillStyle='#0c0c1a'; ctx.fillRect(0,0,WORLD_W,WORLD_H);
  if(!snapOn&&bgTile.complete){
    const tw=bgTile.width||100, th=bgTile.height||100;
    const cols=Math.ceil(WORLD_W/tw), rows=Math.ceil(WORLD_H/th);
    for(let y=0;y<rows;y++){
      for(let x=0;x<cols;x++){
        ctx.drawImage(bgTile, x*tw, y*th, tw, th);
      }
    }
  }

  // Grid
  if(snapOn&&zoom>0.06){
    ctx.lineWidth=0.5/zoom;
    // Fine grid
    if(zoom>0.12){
      ctx.strokeStyle='rgba(70,70,110,0.3)';
      ctx.beginPath();
      for(let x=0;x<=WORLD_W;x+=snap){ctx.moveTo(x,0);ctx.lineTo(x,WORLD_H);}
      for(let y=0;y<=WORLD_H;y+=snap){ctx.moveTo(0,y);ctx.lineTo(WORLD_W,y);}
      ctx.stroke();
    }
    // Major lines every 200
    ctx.strokeStyle='rgba(100,100,160,0.22)';
    ctx.lineWidth=1/zoom;
    ctx.beginPath();
    for(let x=0;x<=WORLD_W;x+=200){ctx.moveTo(x,0);ctx.lineTo(x,WORLD_H);}
    for(let y=0;y<=WORLD_H;y+=200){ctx.moveTo(0,y);ctx.lineTo(WORLD_W,y);}
    ctx.stroke();
    // 200px ruler labels
    if(zoom>0.1){
      ctx.fillStyle='rgba(100,100,160,0.5)';
      ctx.font=`${10/zoom}px monospace`;
      ctx.textAlign='left';
      for(let x=200;x<WORLD_W;x+=200) ctx.fillText(x,x+2,-2/zoom/zoom);
      for(let y=200;y<WORLD_H;y+=200) ctx.fillText(y,2/zoom,y-2);
    }
  }

  // World border
  ctx.strokeStyle='#3a3a6a'; ctx.lineWidth=2/zoom; ctx.strokeRect(0,0,WORLD_W,WORLD_H);

  // ── Floor hint line ──
  ctx.strokeStyle='rgba(255,200,100,0.08)'; ctx.lineWidth=1/zoom;
  ctx.setLineDash([8/zoom,8/zoom]);
  ctx.beginPath(); ctx.moveTo(0,WORLD_H-30); ctx.lineTo(WORLD_W,WORLD_H-30); ctx.stroke();
  ctx.setLineDash([]);

  // Objects
  for(const o of objects) drawObj(o);

  // Top-left spawn indicator (fixed, non-interactive)
  drawSpawnIndicator();

  // Ghost while drawing
  if(drawing){
    const x1=Math.min(dsx,dcx), y1=Math.min(dsy,dcy);
    const w=Math.max(Math.abs(dcx-dsx),snap), h=Math.max(Math.abs(dcy-dsy),snap);
    const c=META[tool]?.col||'#fff';
    ctx.save();
    ctx.globalAlpha=0.4; ctx.fillStyle=c; ctx.fillRect(x1,y1,w,h);
    ctx.globalAlpha=1; ctx.strokeStyle=c; ctx.lineWidth=2/zoom; ctx.strokeRect(x1,y1,w,h);
    // Size label
    ctx.fillStyle='#fff'; ctx.font=`bold ${11/zoom}px monospace`; ctx.textAlign='center';
    ctx.fillText(`${w}×${h}`, x1+w/2, y1+h/2);
    ctx.restore();
  }

  // Crosshair
  if(!drawing&&!moving&&tool!=='select'){
    const sx=snapV(mouseWX), sy=snapV(mouseWY);
    ctx.save();
    ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=0.5/zoom;
    ctx.setLineDash([4/zoom,4/zoom]);
    ctx.beginPath();
    ctx.moveTo(sx,0);ctx.lineTo(sx,WORLD_H);
    ctx.moveTo(0,sy);ctx.lineTo(WORLD_W,sy);
    ctx.stroke();
    ctx.restore();
  }

  ctx.restore();
}

function drawObj(o){
  const sel=o.id===selId;
  const w=o.width||DFLT_SIZE[o.type]?.w||20;
  const h=o.height||DFLT_SIZE[o.type]?.h||20;
  ctx.save();

  if(o.type==='spike'){
    ctx.fillStyle='#d33';
    ctx.beginPath();
    ctx.moveTo(o.x, o.y + h);
    ctx.lineTo(o.x + w / 2, o.y);
    ctx.lineTo(o.x + w, o.y + h);
    ctx.closePath(); ctx.fill();

  } else if(o.type==='ladder'){
    ctx.fillStyle='#b5651d';
    ctx.fillRect(o.x,o.y,w,h);

  } else if(o.type==='wall'){
    ctx.fillStyle='#444';
    ctx.fillRect(o.x,o.y,w,h);

  } else if(o.type==='wall-moving'){
    ctx.fillStyle='#444';
    ctx.fillRect(o.x,o.y,w,h);
    ctx.strokeStyle='rgba(180,180,220,0.55)';
    ctx.lineWidth=1.5/zoom;
    ctx.setLineDash([5/zoom,4/zoom]); ctx.strokeRect(o.x,o.y,w,h); ctx.setLineDash([]);
    // Arrow showing axis
    const ax=o.x+w/2, ay=o.y+h/2, ar=Math.min(w,h)*.28;
    ctx.strokeStyle='rgba(180,180,220,0.7)'; ctx.lineWidth=1.5/zoom;
    if(o.axis==='h'){
      arrow(o.x+w/2-ar, ay, o.x+w/2+ar, ay);
    } else {
      arrow(ax, o.y+h/2-ar, ax, o.y+h/2+ar);
    }

  } else if(o.type==='seesaw'){
    // Pivot
    const px=o.x+w/2, py=o.y;
    ctx.fillStyle='#222';
    ctx.beginPath(); ctx.arc(px, py, 5/zoom, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='#888';
    ctx.beginPath(); ctx.arc(px-1/zoom, py-1/zoom, 2/zoom, 0, Math.PI*2); ctx.fill();
    // Plank
    ctx.fillStyle='#950';
    ctx.fillRect(o.x,o.y,w,h);
  }

  else if(o.type==='light'){
    // Soft glowing circle
    const cx = o.x + w/2, cy = o.y + h/2;
    const rad = o.radius || Math.max(w,h)/2 || 100;
    const g = ctx.createRadialGradient(cx,cy,rad*0.1,cx,cy,rad);
    g.addColorStop(0, (o.color||'#ffdbaa'));
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(cx, cy, rad, 0, Math.PI*2); ctx.fill();
    // Center marker
    ctx.fillStyle = (META.light.col||'#ffcc66'); ctx.beginPath(); ctx.arc(cx,cy,6/zoom,0,Math.PI*2); ctx.fill();

  } else if(o.type==='spawn'){
    // Spawn zone rectangle with label
    ctx.fillStyle='#f1c40f20'; ctx.strokeStyle='#f1c40f'; ctx.lineWidth=1.5/zoom;
    ctx.fillRect(o.x,o.y,w,h); ctx.strokeRect(o.x,o.y,w,h);
    if(zoom>0.12){ ctx.fillStyle='#f1c40f'; ctx.font=`${8/zoom}px monospace`; ctx.textAlign='center'; ctx.fillText('SPAWN', o.x+w/2, o.y+h/2 + 3/zoom); }
  }

  else if(o.type==='oven'){
    // Simple oven icon
    ctx.fillStyle='#2b2b2b'; ctx.fillRect(o.x,o.y,w,h);
    ctx.strokeStyle='#ff8a3c'; ctx.lineWidth=1.2/zoom; ctx.strokeRect(o.x,o.y,w,h);
    if(zoom>0.12){ ctx.fillStyle='#ff8a3c'; ctx.font=`${10/zoom}px monospace`; ctx.textAlign='center'; ctx.fillText('OVEN', o.x+w/2, o.y+h/2 + 4/zoom); }
  }

  // Selection ring + handles
  if(sel){
    ctx.strokeStyle='#ffffff'; ctx.lineWidth=2/zoom; ctx.setLineDash([]);
    ctx.strokeRect(o.x-3/zoom, o.y-3/zoom, w+6/zoom, h+6/zoom);
    ctx.fillStyle='#fff';
    const hs=5/zoom;
    [[o.x,o.y],[o.x+w,o.y],[o.x,o.y+h],[o.x+w,o.y+h]].forEach(([hx,hy])=>{
      ctx.fillRect(hx-hs/2, hy-hs/2, hs, hs);
    });
  }

  ctx.restore();
}

function drawSpawnIndicator(){
  // Spawn is always top-left — show a non-interactive marker
  ctx.save();
  ctx.fillStyle='#f1c40f18';
  ctx.strokeStyle='#f1c40f'; ctx.lineWidth=1.5/zoom;
  ctx.setLineDash([5/zoom,4/zoom]);
  ctx.strokeRect(0,0,24,40); ctx.setLineDash([]);
  ctx.fillRect(0,0,24,40);
  if(zoom>0.12){
    const fs=8/zoom;
    ctx.font=`${fs}px monospace`; ctx.textAlign='center'; ctx.fillStyle='#f1c40f';
    ctx.fillText('SPAWN', 12, 22+fs*.35);
  }
  ctx.restore();
}

function arrow(x1,y1,x2,y2){
  const a=Math.atan2(y2-y1,x2-x1);
  const hs=7/zoom;
  ctx.beginPath();
  ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2-hs*Math.cos(a-.45), y2-hs*Math.sin(a-.45));
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2-hs*Math.cos(a+.45), y2-hs*Math.sin(a+.45));
  ctx.stroke();
}

// ── UI refresh ────────────────────────────────────────────
function refreshUI(){ refreshProps(); refreshList(); statusBar(); render(); }

function setPanel(panel){
  document.querySelectorAll('.rtab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.rpanel-body').forEach(p=>p.classList.remove('active'));
  const btn = document.querySelector(`.rtab[data-tab="${panel}"]`);
  if (btn) btn.classList.add('active');
  const body = document.getElementById('panel-' + panel);
  if (body) body.classList.add('active');
}

function getSelObj(){
  if(!selId) return null;
  return objects.find(o=>o.id===selId)||null;
}

function refreshProps(){
  const area=document.getElementById('props-area');
  const delRow=document.getElementById('del-row');
  const o=getSelObj();
  if(!o){ area.innerHTML='<div class="no-sel">Nothing selected.<br>Click an object to edit.</div>'; delRow.style.display='none'; return; }
  delRow.style.display='block';

  const c=META[o.type]?.col||'#fff';
  let h=`<div id="props-body">`;
  h+=`<div class="prow"><label style="color:${c};width:auto;font-size:12px;font-weight:bold">${META[o.type]?.label||o.type}</label></div>`;

  const row=(lbl,key,type,extra='')=>
    `<div class="prow"><label>${lbl}</label><input type="${type}" value="${o[key]??''}" data-key="${key}" onchange="setProp(this)" ${extra}></div>`;
  const sel=(lbl,key,opts)=>
    `<div class="prow"><label>${lbl}</label><select data-key="${key}" onchange="setProp(this)">${opts}</select></div>`;

  h+=row('X','x','number');
  h+=row('Y','y','number');

  if(META[o.type]?.rect){
    // Allow width/height for all rect types, including spikes
    h+=row('W','width','number');
    h+=row('H','height','number');
  }

  if(o.type==='wall-moving'){
    h+=row('Speed','speed','number','step="0.5"');
    h+=row('Range','range','number');
    h+=sel('Axis','axis',
      `<option value="h" ${o.axis==='h'?'selected':''}>↔ Horizontal</option>
       <option value="v" ${o.axis==='v'?'selected':''}>↕ Vertical</option>`);
  }
  if(o.type==='light'){
    h+=row('Radius','radius','number');
    h+=row('Intensity','intensity','number','step="0.1"');
    h+=row('Color','color','text');
    h+=row('Particle rate','particleSpawnRate','number','step="0.01"');
  }
  if(o.type==='spawn'){
    h+=row('W','width','number');
    h+=row('H','height','number');
    
  }
  if(o.type==='oven'){
    h+=`<div class="prow"><label>Active</label><input type="checkbox" data-key="active" ${o.active?'checked':''} onchange="setProp(this)"></div>`;
    h+=row('Glow','glow','number');
    h+=`<div class="prow"><label>Baked</label><input type="checkbox" data-key="baked" ${o.baked?'checked':''} onchange="setProp(this)"></div>`;
  }
  h+=`</div>`;
  area.innerHTML=h;
}

function setProp(el){
  const key=el.dataset.key;
  const o=getSelObj(); if(!o) return;
  let val = el.type==='checkbox' ? el.checked
           : el.type==='number'  ? parseFloat(el.value)
           : el.value;
  const obj=objects.find(ob=>ob.id===o.id); if(obj) obj[key]=val;
  render(); refreshList();
}

function refreshList(){
  const body=document.getElementById('obj-list');
  document.getElementById('obj-cnt').textContent=objects.length;
  let html='';
  // Group by type
  const types=[...new Set(objects.map(o=>o.type))];
  for(const t of types){
    const list=objects.filter(o=>o.type===t);
    const c=META[t]?.col||'#fff';
    html+=list.map(o=>{
      const s=o.id===selId;
      return `<div class="oitem ${s?'sel':''}" onclick="pickObj(${o.id})">
        <div class="odot" style="background:${c}"></div>
        <span style="color:${s?'#fff':'var(--text)'}">
          ${META[t]?.label||t} <span style="color:var(--dim);font-size:10px">${Math.round(o.x)},${Math.round(o.y)}</span>
        </span></div>`;
    }).join('');
  }
  body.innerHTML=html||'<div class="no-sel">No objects yet.</div>';
}

function pickObj(id){ selId=id; refreshUI(); }

function statusBar(){
  document.getElementById('st-n').textContent=objects.length;
  const o=getSelObj();
  document.getElementById('st-sel').textContent=o
    ? `${META[o.type]?.label||o.type} (${Math.round(o.x)}, ${Math.round(o.y)})`
    : 'none';
}

// ── Settings ──────────────────────────────────────────────
document.getElementById('snap-on').addEventListener('change',function(){ snapOn=this.checked; render(); });
document.getElementById('snap-px').addEventListener('change',function(){ snap=Math.max(1,parseInt(this.value)||20); render(); });

// ── Save / Load ───────────────────────────────────────────
function getLevelPayload(){
  const name=document.getElementById('level-name').value.trim()||'my_level';
  // ensure textarea mirrors current list
  syncTextareaFromList();
  const wavesText = document.getElementById('waves-json')?.value || '[]';
  let waves = [];
  try { waves = JSON.parse(wavesText); } catch(e) { waves = []; }
  return { name, data: JSON.stringify({objects,nextId,waves}, null, 2) };
}

function downloadLevel(){
  const { name, data } = getLevelPayload();
  const blob=new Blob([data], {type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=name+'.lvl';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function saveLevelLocal(){
  const { name, data } = getLevelPayload();

  // Also save into localStorage as a custom level for quick in-game loading
  try {
    const key = 'yt_custom_levels';
    const storeRaw = localStorage.getItem(key) || '{}';
    const store = JSON.parse(storeRaw || '{}');
    store[name] = JSON.parse(data);
    localStorage.setItem(key, JSON.stringify(store));
  } catch (e) {
    console.warn('Failed to save custom level to localStorage', e);
  }

  // Visual feedback
  const btn=event.target; const orig=btn.textContent;
  btn.textContent='✅ Saved!'; setTimeout(()=>btn.textContent=orig,1500);
}

function loadPrompt(){
  const fileInput=document.createElement('input');
  fileInput.type='file';
  fileInput.accept='.lvl';
  fileInput.onchange=function(e){
    const file=e.target.files[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload=function(evt){
      try {
        const d=JSON.parse(evt.target.result);
        objects=d.objects||[]; nextId=d.nextId||1;
        selId=null;
        // Extract filename without extension
        const fname=file.name.replace(/\.lvl$/,'');
        document.getElementById('level-name').value=fname;
        // Load waves into waves editor if present
        if(document.getElementById('waves-json')){
          try{ document.getElementById('waves-json').value = JSON.stringify(d.waves||[], null, 2); } catch(e){ document.getElementById('waves-json').value = '[]'; }
          try{ syncWavesFromTextarea(); } catch(e){}
        }
        refreshUI();
      } catch(err){
        alert('Error loading level: '+err.message);
      }
    };
    reader.readAsText(file);
  };
  fileInput.click();
}

function clearAll(){
  if(!confirm('Clear all objects? (Undo is available)')) return;
  pushUndo(); objects=[]; selId=null; refreshUI();
}

function previewLevel(){
  const name=document.getElementById('level-name').value.trim()||'my_level';
  const wavesText = document.getElementById('waves-json')?.value || '[]';
  let waves = [];
  try { waves = JSON.parse(wavesText); } catch(e) { waves = []; }
  const payload={ name, objects, nextId, waves };
  localStorage.setItem('yt_editor_preview', JSON.stringify(payload));
  window.open('../index.html?editorPreview=1', '_blank');
}

// ── Export ────────────────────────────────────────────────
function genExport(){
  const name=document.getElementById('level-name').value.trim()||'my_level';
  const L=[];
  L.push(`// ── Level: ${name} ── (generated by Level Editor)`);
  L.push(`// Paste inside your startLevel / wave function after clearing arrays`);
  L.push(``);

  const byType={};
  for(const o of objects){ if(!byType[o.type]) byType[o.type]=[]; byType[o.type].push(o); }

  if(byType.wall?.length){
    L.push(`walls.push(`);
    byType.wall.forEach((o,i)=>{
      const c=i<byType.wall.length-1?',':'';
      L.push(`  { x: ${o.x}, y: ${o.y}, width: ${o.width}, height: ${o.height} }${c}`);
    });
    L.push(`);`); L.push(``);
  }

  if(byType['wall-moving']?.length){
    L.push(`walls.push(`);
    byType['wall-moving'].forEach((o,i)=>{
      const c=i<byType['wall-moving'].length-1?',':'';
      const axKey=o.axis==='h'?'startX':'startY';
      const axVal=o.axis==='h'?o.x:o.y;
      L.push(`  { x: ${o.x}, y: ${o.y}, width: ${o.width}, height: ${o.height}, moving: true, dir: 1, speed: ${o.speed??1.5}, ${axKey}: ${axVal}, range: ${o.range??100} }${c}`);
    });
    L.push(`);`); L.push(``);
  }

  if(byType.spike?.length){
    L.push(`spikes.push(`);
    byType.spike.forEach((o,i)=>{
      const c=i<byType.spike.length-1?',':'';
      L.push(`  { x: ${o.x}, y: ${o.y}, width: ${o.width||40}, height: ${o.height||26} }${c}`);
    });
    L.push(`);`); L.push(``);
  }

  if(byType.lights||byType.light){
    const list = byType.light || byType.lights || [];
    L.push(`lights.push(`);
    list.forEach((o,i)=>{
      const c=i<list.length-1?',':'';
      L.push(`  { x: ${o.x + (o.width||0)/2}, y: ${o.y + (o.height||0)/2}, radius: ${o.radius || Math.max(o.width,o.height)||200}, intensity: ${o.intensity||1}, color: '${o.color||'#ffdbaa'}' }${c}`);
    });
    L.push(`);`); L.push(``);
  }

  if(byType.spawn?.length){
    L.push(`// spawn zones (editor)
    // stored as objects in level file; no automatic runtime push here`);
    L.push(``);
  }

  if(byType.oven?.length){
    L.push(`ovens.push(`);
    byType.oven.forEach((o,i)=>{
      const c=i<byType.oven.length-1?',':'';
      L.push(`  { x: ${o.x}, y: ${o.y}, width: ${o.width||40}, height: ${o.height||50}, active: ${o.active||false}, baked: ${o.baked||false}, glow: ${o.glow||0} }${c}`);
    });
    L.push(`);`); L.push(``);
  }

  if(byType.ladder?.length){
    L.push(`ladders.push(`);
    byType.ladder.forEach((o,i)=>{
      const c=i<byType.ladder.length-1?',':'';
      L.push(`  { x: ${o.x}, y: ${o.y}, width: ${o.width}, height: ${o.height} }${c}`);
    });
    L.push(`);`); L.push(``);
  }

  if(byType.seesaw?.length){
    L.push(`seesaws.push(`);
    byType.seesaw.forEach((o,i)=>{
      const c=i<byType.seesaw.length-1?',':'';
      L.push(`  { x: ${o.x}, y: ${o.y}, width: ${o.width}, height: ${o.height}, angle: 0, angularVelocity: 0 }${c}`);
    });
    L.push(`);`); L.push(``);
  }

  // Include waves JSON (if present) as a comment block for manual import
  const wavesText = document.getElementById('waves-json')?.value || '';
  if (wavesText.trim()) {
    L.push(`// --- Waves (JSON) ---`);
    const wLines = wavesText.split('\n');
    for (const ln of wLines) L.push(`// ${ln}`);
    L.push(``);
  }

  document.getElementById('export-code').value=L.join('\n');
}

function copyExport(){
  const ta=document.getElementById('export-code');
  if(!ta.value) genExport();
  navigator.clipboard.writeText(ta.value).then(()=>{
    const btn=event.target; const orig=btn.textContent;
    btn.textContent='✅ Copied!'; setTimeout(()=>btn.textContent=orig,1600);
  });
}

// Waves editing helpers
let wavesArr = [];

const ENEMY_DEFAULTS = {
  snail: { label: 'Snail', hp: 1 },
  superSnail: { label: 'Super Snail', hp: 3 },
  bat: { label: 'Bat', hp: 2 },
  turret: { label: 'Turret', hp: 2 },
  table: { label: 'Table', hp: 4 },
  yeti: { label: 'Yeti', hp: 5 },
  snowman: { label: 'Snowman', hp: 4 }
};

function getEnemyDefaultHP(type){ return ENEMY_DEFAULTS[type]?.hp ?? 1; }

function normalizeWaves(raw){
  if (!Array.isArray(raw)) return [];
  return raw.map((w,i)=>{
    const enemies = Array.isArray(w.enemies) ? w.enemies.map(e=>{
      let min = 1, max = 1;
      if (typeof e.count === 'number') { min = max = e.count; }
      else if (e.count && typeof e.count === 'object') { min = e.count.min ?? 1; max = e.count.max ?? min; }
      else if (typeof e.min === 'number' || typeof e.max === 'number') { min = e.min ?? 1; max = e.max ?? min; }
      const type = e.type || 'snail';
      return { type, min, max, hp: typeof e.hp === 'number' ? e.hp : getEnemyDefaultHP(type) };
    }) : [];
    return {
      name: w.name || `Wave ${i+1}`,
      spawnDelay: Number.isFinite(w.spawnDelay) ? w.spawnDelay : 60,
      message: w.message || '',
      enemies
    };
  });
}

function serializeWaves(){
  return wavesArr.map(w=>({
    name: w.name,
    spawnDelay: w.spawnDelay,
    message: w.message,
    enemies: (w.enemies||[]).map(e=>({
      type: e.type,
      count: e.min === e.max ? e.min : { min: e.min, max: e.max },
      hp: e.hp
    }))
  }));
}

function syncWavesFromTextarea(){
  const ta = document.getElementById('waves-json');
  let parsed = [];
  try { parsed = JSON.parse(ta.value||'[]'); } catch(e){ parsed = []; }
  wavesArr = normalizeWaves(parsed);
  renderWaveList();
}

function syncTextareaFromList(){
  const ta = document.getElementById('waves-json');
  ta.value = JSON.stringify(serializeWaves(), null, 2);
}

function renderEnemyPalette(){
  const wrap = document.getElementById('enemy-palette');
  wrap.innerHTML = '';
  Object.keys(ENEMY_DEFAULTS).forEach(type=>{
    const chip = document.createElement('div');
    chip.className = 'enemy-chip';
    chip.textContent = ENEMY_DEFAULTS[type].label;
    chip.draggable = true;
    chip.addEventListener('dragstart', (ev)=>{ ev.dataTransfer.setData('enemyType', type); });
    wrap.appendChild(chip);
  });
}

function renderWaveList(){
  const wrap = document.getElementById('waves-list');
  wrap.innerHTML = '';
  wavesArr.forEach((w,i)=>{
    const item = document.createElement('div');
    item.className = 'wave-item';
    item.dataset.index = i;

    const head = document.createElement('div');
    head.className = 'wave-head';

    const handle = document.createElement('div');
    handle.className = 'wave-handle'; handle.textContent = '↕';
    handle.draggable = true;
    handle.addEventListener('dragstart', (ev)=>{ ev.dataTransfer.setData('waveIndex', i.toString()); });

    const label = document.createElement('div'); label.className='wave-label'; label.textContent = `Wave ${i+1}`;
    const nameInput = document.createElement('input'); nameInput.className='wave-input'; nameInput.placeholder='Name'; nameInput.value = w.name || `Wave ${i+1}`;
    nameInput.addEventListener('input', ()=>{ w.name = nameInput.value; syncTextareaFromList(); });

    const delayInput = document.createElement('input'); delayInput.className='wave-input'; delayInput.type='number'; delayInput.value = w.spawnDelay || 60; delayInput.style.width='60px';
    delayInput.addEventListener('input', ()=>{ w.spawnDelay = parseInt(delayInput.value,10)||0; syncTextareaFromList(); });

    const msgInput = document.createElement('input'); msgInput.className='wave-input'; msgInput.placeholder='Message'; msgInput.value = w.message || '';
    msgInput.addEventListener('input', ()=>{ w.message = msgInput.value; syncTextareaFromList(); });

    const del = document.createElement('button'); del.className='btn bd'; del.textContent='Del'; del.onclick = ()=>{ wavesArr.splice(i,1); syncTextareaFromList(); renderWaveList(); };

    head.appendChild(handle); head.appendChild(label); head.appendChild(nameInput); head.appendChild(delayInput); head.appendChild(msgInput); head.appendChild(del);

    const drop = document.createElement('div');
    drop.className = 'wave-drop';
    drop.addEventListener('dragover', (ev)=>{ ev.preventDefault(); });
    drop.addEventListener('drop', (ev)=>{
      ev.preventDefault(); ev.stopPropagation();
      const type = ev.dataTransfer.getData('enemyType');
      if (!type) return;
      w.enemies = w.enemies || [];
      w.enemies.push({ type, min: 1, max: 3, hp: getEnemyDefaultHP(type) });
      syncTextareaFromList(); renderWaveList();
    });

    if (!w.enemies || !w.enemies.length) {
      const empty = document.createElement('div'); empty.className='wave-empty'; empty.textContent='Drag enemies here';
      drop.appendChild(empty);
    } else {
      const header = document.createElement('div'); header.className='wave-enemy-header';
      header.innerHTML = `<div class="enemy-pill">Enemy</div><div class="enemy-pill">Min</div><div class="enemy-pill">Max</div><div class="enemy-pill">HP</div>`;
      drop.appendChild(header);
      w.enemies.forEach((e,ei)=>{
        const row = document.createElement('div'); row.className='wave-enemy';
        const pill = document.createElement('div'); pill.className='enemy-pill'; pill.textContent = ENEMY_DEFAULTS[e.type]?.label || e.type;
        const minInput = document.createElement('input'); minInput.className='enemy-input'; minInput.type='number'; minInput.value = e.min ?? 1;
        const maxInput = document.createElement('input'); maxInput.className='enemy-input'; maxInput.type='number'; maxInput.value = e.max ?? 1;
        const hpInput = document.createElement('input'); hpInput.className='enemy-input'; hpInput.type='number'; hpInput.value = e.hp ?? getEnemyDefaultHP(e.type);
        const delEnemy = document.createElement('button'); delEnemy.className='btn bd'; delEnemy.textContent='X';

        minInput.addEventListener('input', ()=>{
          e.min = parseInt(minInput.value,10) || 0;
          if (e.max < e.min) { e.max = e.min; maxInput.value = e.min; }
          syncTextareaFromList();
        });
        maxInput.addEventListener('input', ()=>{ e.max = parseInt(maxInput.value,10) || 0; if (e.max < e.min) { e.max = e.min; maxInput.value = e.min; } syncTextareaFromList(); });
        hpInput.addEventListener('input', ()=>{ e.hp = parseInt(hpInput.value,10) || 1; syncTextareaFromList(); });
        delEnemy.addEventListener('click', ()=>{ w.enemies.splice(ei,1); syncTextareaFromList(); renderWaveList(); });

        row.appendChild(pill);
        row.appendChild(minInput);
        row.appendChild(maxInput);
        row.appendChild(hpInput);
        row.appendChild(delEnemy);
        drop.appendChild(row);
      });
    }

    item.addEventListener('dragover', (ev)=>{ if (ev.dataTransfer.getData('waveIndex')) { ev.preventDefault(); item.classList.add('wave-drop-target'); } });
    item.addEventListener('dragleave', ()=>{ item.classList.remove('wave-drop-target'); });
    item.addEventListener('drop', (ev)=>{
      const from = parseInt(ev.dataTransfer.getData('waveIndex'),10);
      const to = parseInt(item.dataset.index,10);
      if (!Number.isNaN(from) && !Number.isNaN(to) && from !== to) {
        const it = wavesArr.splice(from,1)[0];
        wavesArr.splice(to,0,it);
        syncTextareaFromList(); renderWaveList();
      }
      item.classList.remove('wave-drop-target');
    });

    item.appendChild(head);
    item.appendChild(drop);
    wrap.appendChild(item);
  });
}

function addWave(){
  const idx = wavesArr.length + 1;
  wavesArr.push({ name: `Wave ${idx}`, enemies: [], spawnDelay: 60, message: '' });
  syncTextareaFromList(); renderWaveList();
}

function applyWavesFromTextarea(){
  syncWavesFromTextarea(); alert('Waves parsed and applied to editor. Save to persist.');
}

function clearWaves(){ wavesArr = []; syncTextareaFromList(); renderWaveList(); }

// ── Canvas resize ─────────────────────────────────────────
function resize(){
  cv.width=cw.clientWidth; cv.height=cw.clientHeight; render();
}
new ResizeObserver(resize).observe(cw);
resize();

// Centre world on load
vx=(cw.clientWidth - WORLD_W*zoom)/2;
vy=(cw.clientHeight- WORLD_H*zoom)/2;

refreshUI();
// Initialize waves list from textarea on load
renderEnemyPalette();
syncWavesFromTextarea();

// Listen for load requests from parent page (open for edit)
window.addEventListener('message', (ev)=>{
  try{
    const msg = ev.data || {};
    if (msg && msg.type === 'load-custom-level' && msg.name) {
      const raw = localStorage.getItem('yt_custom_levels') || '{}';
      const store = JSON.parse(raw || '{}');
      const data = store[msg.name];
      if (!data) return;
      objects = JSON.parse(JSON.stringify(data.objects || []));
      nextId = data.nextId || (objects.reduce((m,o)=>Math.max(m,o.id||0),0)+1);
      try{ wavesArr = normalizeWaves(data.waves || []); syncTextareaFromList(); renderWaveList(); } catch(e){}
      selId = null; refreshUI();
    }
  }catch(err){ console.warn('message handling failed', err); }
});
</script>
